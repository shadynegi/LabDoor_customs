version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      security-core:
        patterns:
          - express
          - "@paypal/checkout-server-sdk"
          - "@sentry/node"
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      security-core:
        patterns:
          - react
          - react-dom
          - "@sentry/react"
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
