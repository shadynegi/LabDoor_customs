name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate backend production environment schema
        run: npm run validate-env -w backend
        env:
          CI_VALIDATE_PRODUCTION: 'true'
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          FRONTEND_URL: https://www.labdoorcustoms.com
          ADMIN_PASSWORD_HASH: '$2b$12$ci.placeholder.hash.for.validation.only'
          ADMIN_USERNAME: ci-admin
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          PAYPAL_WEBHOOK_ID: ci-webhook-id
          REDIS_URL: redis://localhost:6379
          SENTRY_DSN: https://example@sentry.io/0
          RESEND_API_KEY: re_ci_placeholder
          PAYPAL_CLIENT_ID: ci-paypal-client
          PAYPAL_SECRET: ci-paypal-secret
          TRUST_CLOUDFLARE: 'true'
          REQUIRE_PAYPAL_LIVE: 'false'
      - name: Require VITE_SENTRY_DSN secret
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          if [ -z "$VITE_SENTRY_DSN" ]; then
            echo "VITE_SENTRY_DSN GitHub secret is required for monorepo CI builds"
            exit 1
          fi
      - name: Build monorepo (frontend + backend)
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          VITE_API_BASE_URL: /api
          VITE_SITE_URL: https://www.labdoorcustoms.com
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      - name: Backend tests
        run: npm test
      - name: Install E2E test runner
        working-directory: Tests
        run: npm ci
      - name: Install Playwright browser
        working-directory: Tests
        run: npx playwright install chromium --with-deps
      - name: Run storefront E2E smoke tests
        working-directory: Tests
        run: npm run test:frontend
        env:
          CI: true

  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Require production API URL secret
        env:
          PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
        run: |
          if [ -z "$PRODUCTION_API_BASE_URL" ]; then
            echo "PRODUCTION_API_BASE_URL GitHub secret is required for sitemap CI"
            exit 1
          fi
      - run: npm ci
      - name: Generate sitemap with live API
        run: npm run sitemap -w frontend
        env:
          CI: true
          VITE_SITE_URL: https://www.labdoorcustoms.com
          VITE_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
          SITEMAP_REQUIRE_PRODUCTS: 'true'

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run links:check
